name: Deploy to Cloudflare Pages

# mainブランチへのプッシュ時に自動デプロイ
# masterブランチへのプッシュ時はPreviewデプロイ
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js のセットアップ（プロジェクトのバージョンに合わせる）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. 依存パッケージのインストール
      - name: Install dependencies
        run: npm ci

      # 4. ビルド実行
      - name: Build
        run: npm run build

      # 5. Cloudflare Pages へデプロイ
      #    - mainブランチ → Production（本番URL）
      #    - masterブランチ / PRブランチ → Preview URL
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=tocotoco-frontend --branch=${{ github.ref_name }}

      # 6. デプロイ結果をPRにコメント（PRの場合のみ）
      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Cloudflare Pages Preview デプロイ完了**\n\nPreview URLはCloudflare Pagesダッシュボードで確認できます。'
            })
