name: Set Backend GEMINI_API_KEY

on:
  workflow_dispatch:
    inputs:
      gemini_api_key:
        description: 'Gemini API Key to set in Cloudflare Workers'
        required: true
        type: string

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Set GEMINI_API_KEY in Cloudflare Workers
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/tocotoco-backend/secrets" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "GEMINI_API_KEY",
              "text": "${{ github.event.inputs.gemini_api_key }}",
              "type": "secret_text"
            }' | python3 -c "import json,sys; r=json.load(sys.stdin); print('Success:', r.get('success'), r.get('result', r.get('errors', '')))"
